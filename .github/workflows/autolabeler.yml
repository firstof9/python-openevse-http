name: Autolabeler

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions: {}

concurrency:
  group: ${{ format('al-{0}-pr-{1}', github.event_name, github.event.pull_request.number) }}
  cancel-in-progress: true

jobs:
  autolabel:
    name: Autolabel PR
    # Run on pull_request_target for forks, pull_request for
    # same-repo PRs to prevent duplicate runs.
    if: >
      (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.fork) ||
      (github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork)
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: release-drafter/release-drafter/autolabeler@eada3c96a64734dd381cfbda23511034e328ddb0  # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
